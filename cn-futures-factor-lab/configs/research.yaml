# 这些边界对所有基准模型和机器学习模型统一生效，不能为某个模型单独改日期。
# 训练期：拟合参数；验证期：选因子、模型和超参数；测试期：方案冻结后只打开一次。
periods:
  train:
    start: "2020-01-01"
    end: "2022-12-31"
    purpose: "拟合模型和因子参数"
  validation:
    start: "2023-01-01"
    end: "2024-12-31"
    purpose: "比较模型、选择超参数和策略规则"
  test:
    start: "2025-01-01"
    end: "2025-12-31"
    purpose: "冻结方案后的样本外评价"

# 当前团队已经查看过包含 2025 年的全样本 Demo，因此这段历史不能再被宣称为完全
# 未观察的最终盲测。正式论文应在研究方案冻结后，用新增且从未查看的数据再做一次。
final_holdout:
  status: observed_during_framework_debugging
  rule: "模型与策略冻结后，使用此前从未查看的新增数据，只运行一次"
