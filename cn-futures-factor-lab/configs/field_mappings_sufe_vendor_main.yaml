# 数据商主力合约表只用于核对项目自行选择的主力合约，不作为正式收益输入。
columns:
  trade_date: trade_date
  exchange: exchange
  product: variety
  contract: contract_code
  open: open
  high: high
  low: low
  close: close
  settlement: null
  pre_settlement: null
  volume: volume
  open_interest: open_interest
  turnover: amount
  upper_limit: null
  lower_limit: null

multipliers:
  volume: 1.0
  open_interest: 1.0
  turnover: 1.0

date_format: "%Y%m%d"
csv_encoding: utf-8-sig

value_mappings:
  exchange:
    上海: SHFE
    大连: DCE
    郑州: CZCE

exchange_by_product:
  BC: INE
  LU: INE
  NR: INE
  SC: INE
