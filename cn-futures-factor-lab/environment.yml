name: cn-futures-factor

# 统一使用 conda-forge，可以减少不同操作系统之间依赖来源不一致的问题。
channels:
  - conda-forge
  - nodefaults

dependencies:
  - python=3.11
  - pip>=24
  - numpy>=1.26,<3
  - pandas>=2.2,<4
  - pyarrow>=16,<24
  - openpyxl>=3.1,<4
  - pyyaml>=6,<7
  - matplotlib>=3.8,<4
  - pytest>=8,<10
  - pytest-cov>=5,<8
  - ruff>=0.6,<1
  - pip:
      # 使用 editable 模式安装本项目。修改 src/ 后不需要重复安装。
      - -e .[dev]

